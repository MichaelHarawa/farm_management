services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: django_app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:6000"
    env_file:
      - .env
    volumes:
      - ..:/app

    ports:
      - "6000:6000"
    environment:
      DB_ENGINE: postgres
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_SSLMODE: disable
      POSTGRES_CONNECT_TIMEOUT: 5
      # AUTH_BYPASS_ENABLED: ${AUTH_BYPASS_ENABLED:-}
      # AUTH_BYPASS_USERNAME: ${AUTH_BYPASS_USERNAME:-}
      # AUTH_BYPASS_EMAIL: ${AUTH_BYPASS_EMAIL:-}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cr_management"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  # frontend_node_modules:
